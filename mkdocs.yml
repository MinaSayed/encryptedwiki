site_name: Encrypted Wiki

# 📏 ربط ملف CSS للعرض الكامل (Full-Width). لاحظ الإزاحة بمسافتين تحت extra_css
extra_css:
  - css/extra.css

# 🔑 لتمكين اسم اللغة في صناديق الكود (Title)
markdown_extensions:
  - attr_list
  - pymdownx.superfences

theme:
  name: material
  palette:
    scheme: slate
    primary: black
  features:
    - content.code.copy # ميزة نسخ الكود

nav:
  - Home: index.md
